services:

  app:
    build: .
    container_name: employee-app
    working_dir: /var/www
    volumes:
      - .:/var/www

  nginx:
    image: nginx:latest
    container_name: employee-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app